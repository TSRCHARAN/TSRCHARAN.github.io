<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>S.AI - T Sai Ram Charan</title>
    
    <!-- Google Fonts - Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
      // Prevent flash of unstyled content
      const theme = localStorage.getItem('theme') || 
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      }
    </script>
    
    <!-- GitHub Pages SPA routing redirect -->
    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="debug" style="position: fixed; top: 0; left: 0; background: red; color: white; padding: 10px; font-size: 12px; z-index: 9999;">
      Loading React App...
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      console.log('Debug: Checking React mount...');
      // Hide debug div when React mounts
      window.addEventListener('load', function() {
        var debugDiv = document.getElementById('debug');
        if (debugDiv) {
          setTimeout(() => {
            if (document.getElementById('root').children.length > 0) {
              console.log('Debug: React mounted, hiding debug div');
              debugDiv.style.display = 'none';
            } else {
              console.log('Debug: Root is empty, React may have crashed');
            }
          }, 2000);
        }
      });
    </script>
  </body>
</html>
